name: Autobot Smart Link

on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled, milestoned, demilestoned, closed]
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled, milestoned, demilestoned, closed]
  repository_dispatch:
    types: [smart-link-alert]
  workflow_dispatch:
    inputs:
      payload:
        description: Normalized Smart Link source payload JSON
        required: false
        type: string
      threshold:
        description: Deterministic emission threshold
        default: "80"
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  autobot-smart-link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Run fixed Autobot scenario coverage
        run: node --test tests/autobot_smart_link_unified.test.cjs tests/autobot_scripts.test.cjs tests/smart_link_scripts.test.cjs tests/deterministic_scenario_lanes.test.cjs
      - name: Run adversarial CEM scenario coverage
        run: node --test tests/autobot_adversarial.test.cjs
      - name: Analyze Unified Automation State
        id: analyze
        env:
          UNIFIED_AUTOMATION_STATE_FILE: /tmp/autobot_smart_link_state.json
        uses: actions/github-script@v9
        with:
          script: |
            const helperPath = `${process.env.GITHUB_WORKSPACE || process.cwd()}/.github/scripts/autobot/unified.cjs`;
            const { analyzeUnifiedAutomationState } = require(helperPath);
            const { owner, repo } = context.repo;
            const thresholdInput = (context.payload.inputs && context.payload.inputs.threshold)
              || (context.payload.client_payload && context.payload.client_payload.threshold)
              || "";
            const outputs = await analyzeUnifiedAutomationState({
              context,
              core,
              github,
              owner,
              repo,
              stateFile: process.env.UNIFIED_AUTOMATION_STATE_FILE,
              thresholdInput
            });
            for (const [name, value] of Object.entries(outputs)) {
              core.setOutput(name, value);
            }
      - name: Apply Unified Automation State
        if: steps.analyze.outputs.ready == 'true'
        env:
          UNIFIED_AUTOMATION_STATE_FILE: /tmp/autobot_smart_link_state.json
        uses: actions/github-script@v9
        with:
          script: |
            const helperPath = `${process.env.GITHUB_WORKSPACE || process.cwd()}/.github/scripts/autobot/unified.cjs`;
            const { applyUnifiedAutomationState } = require(helperPath);
            const { owner, repo } = context.repo;
            await applyUnifiedAutomationState({
              context,
              github,
              owner,
              repo,
              stateFile: process.env.UNIFIED_AUTOMATION_STATE_FILE
            });