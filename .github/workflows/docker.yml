name: Docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build-target:
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - animation
          - audio
          - chat
          - faiss
          - image
          - train
          - translate
          - video
      image_tag:
        required: true
        default: 'latest'
        type: string
      dry_run:
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        docker-image: ${{ (github.event.inputs.build-target == 'all' || github.event_name != 'workflow_dispatch') && fromJSON('["animation", "audio", "chat", "faiss", "image", "train", "translate", "video"]') || fromJSON(format('["{0}"]', github.event.inputs.build-target)) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        if: github.event.inputs.dry_run != 'true' && github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          file: ./docker/${{ matrix.docker-image }}/Dockerfile
          context: .
          push: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false') }}
          tags: yaronkoresh/${{ matrix.docker-image }}:${{ github.event.inputs.image_tag || 'latest' }}
